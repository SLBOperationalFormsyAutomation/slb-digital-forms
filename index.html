<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Visitantes SLB</title>

<style>
:root {
  --slb-blue-dark: #001f3d;
}

body {
  font-family: Arial, sans-serif;
  background-image: url('Fondo.png');
  background-size: cover;
  background-position: center;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

form {
  background-color: rgba(255,255,255,0.95);
  padding: 25px;
  border-radius: 12px;
  width: 95%;
  max-width: 520px;
  color: #000;
}

h2 {
  text-align: center;
  color: var(--slb-blue-dark);
}

label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

canvas {
  border: 1px solid #ccc;
  background: #fff;
  width: 100%;
  height: 100px;
  border-radius: 6px;
}

button {
  background-color: var(--slb-blue-dark);
  color: white;
  padding: 12px;
  border: none;
  width: 100%;
  margin-top: 15px;
  border-radius: 8px;
}

.small {
  font-size: 0.8em;
  font-weight: normal;
}
</style>

</head>
<body>

<form id="formRegistro">
<h2>Registro de Visitantes</h2>

<label>Nombre completo</label>
<input id="nombre" required>

<label>Tipo documento</label>
<select id="tipoDocumento">
  <option>C.C</option>
  <option>C.E</option>
  <option>GIN</option>
</select>

<label>Documento</label>
<input id="documento" required>

<label>Contacto</label>
<input id="contacto" required>

<label>Empresa</label>
<input id="empresa" required>

<label>Alcocheck</label>
<select id="alcocheck">
  <option>Negativo</option>
  <option>Positivo</option>
</select>

<label>ARL</label>
<input id="arl">

<label>EPS</label>
<input id="eps">

<label>RH</label>
<input id="rh">

<label>Alergias</label>
<input id="alergias">

<label>Contacto emergencia (Nombre y Teléfono)</label>
<input id="emergencia">

<label>A quién visita</label>
<input id="visita">

<label>Laptop - Serial</label>
<input id="serial">

<label>Laptop - Hora ingreso</label>
<input id="laptopIngreso">

<label>Laptop - Hora salida</label>
<input id="laptopSalida">

<hr>

<label>Firma</label>
<canvas id="firma"></canvas>
<button type="button" id="limpiar">Limpiar firma</button>

<label class="small">
<input type="checkbox" id="aceptaDatos" required>
De conformidad con lo dispuesto en la Ley 1581 de 2012 y demas normas vigentes sobre proteccion de datos personales, autorizo libre, expresa e inequivocamente a Compagnie D'Operations Petrolieres Schlumberger (COPS) o SLB, para que realice la recoleccion y tratamiento de mis datos personales que aqui suministro de manera veraz y completa, los cuales seran utilizados para fines de seguridad. Asi mismo, declaro que conozco que la recoleccion y tratamiento de mis datos personales se realizara de conformidad con lo indicado en la Politica de Tratamiento de datos Personales que podra ser encontrada en el siguiente codigo QR y que en el caso de ejercicio de queja, rectificacion, actualizacion, consulta, o solicitud de acceso o sustraccion de datos, remitire la solicitud al correo electronico: leyprotecciondatos@slb.com.
</label>

<button type="submit">Registrar</button>

</form>

<script>
const canvas = document.getElementById("firma");
const ctx = canvas.getContext("2d");

let dibujando = false;
let lastX = 0;
let lastY = 0;

// Soporte mouse + celular
const getPos = (e) => {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return {
      x: e.touches[0].clientX - rect.left,
      y: e.touches[0].clientY - rect.top
    };
  }
  return {
    x: e.clientX - rect.left,
    y: e.clientY - rect.top
  };
};

const iniciar = (e) => {
  dibujando = true;
  const pos = getPos(e);
  lastX = pos.x;
  lastY = pos.y;
};

const dibujar = (e) => {
  if (!dibujando) return;
  e.preventDefault();

  const pos = getPos(e);

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(pos.x, pos.y);
  ctx.strokeStyle = "#001f3d";
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.stroke();

  lastX = pos.x;
  lastY = pos.y;
};

const detener = () => dibujando = false;

// Eventos
canvas.addEventListener("mousedown", iniciar);
canvas.addEventListener("mousemove", dibujar);
canvas.addEventListener("mouseup", detener);
canvas.addEventListener("mouseout", detener);

canvas.addEventListener("touchstart", iniciar);
canvas.addEventListener("touchmove", dibujar);
canvas.addEventListener("touchend", detener);

// Limpiar firma SOLO manual
document.getElementById("limpiar").onclick = () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
};

// Envío
document.getElementById("formRegistro").addEventListener("submit", async (e) => {
  e.preventDefault();

  const data = {
    nombre: nombre.value,
    tipoDocumento: tipoDocumento.value,
    documento: documento.value,
    contacto: contacto.value,
    empresa: empresa.value,
    alcocheck: alcocheck.value,
    arl: arl.value,
    eps: eps.value,
    rh: rh.value,
    alergias: alergias.value,
    emergencia: emergencia.value,
    visita: visita.value,
    serial: serial.value,
    laptopIngreso: laptopIngreso.value,
    laptopSalida: laptopSalida.value,
    firma: canvas.toDataURL(),
    aceptaDatos: aceptaDatos.checked
  };

  const res = await fetch("http://127.0.0.1:5000/registro", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(data)
  });

  if(res.ok){
    alert("Guardado ✅");

    // LIMPIAR SOLO CAMPOS (NO FIRMA)
    document.querySelectorAll("input").forEach(i => {
      if(i.type !== "checkbox") i.value = "";
    });
    document.querySelectorAll("select").forEach(s => s.selectedIndex = 0);
    aceptaDatos.checked = false;

  } else {
    alert("Error");
  }
});
</script>

</body>
</html>
