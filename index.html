<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Registro Visitantes SLB</title>
<link rel="icon" href="logo.png">

<style>
:root {
  --slb-blue-dark: #001f3d;
}

body {
  font-family: Arial, sans-serif;
  background-image: url('Fondo.png');
  background-size: cover;
  background-position: center;
  margin: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

form {
  background-color: rgba(255,255,255,0.95);
  padding: 25px;
  border-radius: 12px;
  width: 95%;
  max-width: 520px;
  color: #000;
}

h2 {
  text-align: center;
  color: var(--slb-blue-dark);
}

label {
  display: block;
  margin-top: 10px;
  font-weight: bold;
}

input, select {
  width: 100%;
  padding: 8px;
  margin-top: 4px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

canvas {
  border: 1px solid #ccc;
  background: #fff;
  width: 100%;
  height: 100px;
  border-radius: 6px;
}

button {
  background-color: var(--slb-blue-dark);
  color: white;
  padding: 12px;
  border: none;
  width: 100%;
  margin-top: 15px;
  border-radius: 8px;
}

.small {
  font-size: 0.8em;
  font-weight: normal;
}
</style>

</head>
<body>

<form id="formRegistro">
<h2>Registro de Visitantes</h2>

<label>Nombre completo</label>
<input id="nombre" required>

<label>Tipo documento</label>
<select id="tipoDocumento">
  <option>C.C</option>
  <option>C.E</option>
  <option>GIN</option>
</select>

<label>Documento</label>
<input id="documento" required>

<label>Contacto</label>
<input id="contacto" required>

<label>Empresa</label>
<input id="empresa" required>

<label>Alcocheck</label>
<select id="alcocheck">
  <option>Negativo</option>
  <option>Positivo</option>
</select>

<label>ARL</label>
<input id="arl">

<label>EPS</label>
<input id="eps">

<label>RH</label>
<input id="rh">

<label>Alergias</label>
<input id="alergias">

<label>Contacto emergencia (Nombre y Teléfono)</label>
<input id="emergencia">

<label>A quién visita</label>
<input id="visita">

<label>Laptop - Serial</label>
<input id="serial">

<label>Laptop - Hora ingreso</label>
<input id="laptopIngreso">

<label>Laptop - Hora salida</label>
<input id="laptopSalida">

<hr>

<label>Firma</label>
<canvas id="firma"></canvas>
<button type="button" id="limpiar">Limpiar firma</button>

<label class="small">
<input type="checkbox" id="aceptaDatos" required>
De conformidad con lo dispuesto en la Ley 1581 de 2012 y demas normas vigentes sobre proteccion de datos personales, autorizo libre, expresa e inequivocamente a Compagnie D'Operations Petrolieres Schlumberger (COPS) o SLB, para que realice la recoleccion y tratamiento de mis datos personales que aqui suministro de manera veraz y completa, los cuales seran utilizados para fines de seguridad. Asi mismo, declaro que conozco que la recoleccion y tratamiento de mis datos personales se realizara de conformidad con lo indicado en la Politica de Tratamiento de datos Personales que podra ser encontrada en el siguiente codigo QR y que en el caso de ejercicio de queja, rectificacion, actualizacion, consulta, o solicitud de acceso o sustraccion de datos, remitire la solicitud al correo electronico: leyprotecciondatos@slb.com.
</label>

<button type="submit">Registrar</button>

</form>

<script>
const form = document.getElementById("formRegistro");
const canvas = document.getElementById("firma");
const ctx = canvas.getContext("2d");

let dibujando = false;

// Ajustar resolución real del canvas (IMPORTANTE para móviles)
function ajustarCanvas() {
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
}
window.addEventListener("load", ajustarCanvas);
window.addEventListener("resize", ajustarCanvas);

// 🔹 FUNCIONES GENERALES
function iniciarDibujo(x, y) {
  dibujando = true;
  ctx.beginPath();
  ctx.moveTo(x, y);
}

function dibujarLinea(x, y) {
  if (!dibujando) return;
  ctx.lineWidth = 2;
  ctx.lineCap = "round";
  ctx.strokeStyle = "#002855";
  ctx.lineTo(x, y);
  ctx.stroke();
}

function terminarDibujo() {
  dibujando = false;
}

// 🔹 MOUSE
canvas.addEventListener("mousedown", (e) => {
  const rect = canvas.getBoundingClientRect();
  iniciarDibujo(e.clientX - rect.left, e.clientY - rect.top);
});

canvas.addEventListener("mousemove", (e) => {
  const rect = canvas.getBoundingClientRect();
  dibujarLinea(e.clientX - rect.left, e.clientY - rect.top);
});

canvas.addEventListener("mouseup", terminarDibujo);
canvas.addEventListener("mouseout", terminarDibujo);

// 🔹 TOUCH (CELULARES)
canvas.addEventListener("touchstart", (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  iniciarDibujo(touch.clientX - rect.left, touch.clientY - rect.top);
});

canvas.addEventListener("touchmove", (e) => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const touch = e.touches[0];
  dibujarLinea(touch.clientX - rect.left, touch.clientY - rect.top);
});

canvas.addEventListener("touchend", terminarDibujo);

// 🔹 BORRAR FIRMA
document.getElementById("limpiar").addEventListener("click", () => {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.beginPath();
});

// 🔹 VALIDAR SI FIRMA ESTÁ VACÍA
function firmaVacia() {
  const blank = document.createElement("canvas");
  blank.width = canvas.width;
  blank.height = canvas.height;
  return canvas.toDataURL() === blank.toDataURL();
}

const API_BASE = "https://slb-digital-forms.onrender.com";

// 🔹 SUBMIT
form.addEventListener("submit", async (e) => {
  e.preventDefault();

  if (firmaVacia()) {
    alert("Debe ingresar una firma");
    return;
  }

  const dataURL = canvas.toDataURL();

  const data = {
    nombre: document.getElementById("nombre").value,
    tipoDocumento: document.getElementById("tipoDocumento").value,
    documento: document.getElementById("documento").value,
    contacto: document.getElementById("contacto").value,
    empresa: document.getElementById("empresa").value,
    alcocheck: document.getElementById("alcocheck").value,
    arl: document.getElementById("arl").value,
    eps: document.getElementById("eps").value,
    rh: document.getElementById("rh").value,
    alergias: document.getElementById("alergias").value,
    emergencia: document.getElementById("emergencia").value,
    visita: document.getElementById("visita").value,
    serial: document.getElementById("serial").value,
    laptopIngreso: document.getElementById("laptopIngreso").value,
    laptopSalida: document.getElementById("laptopSalida").value,
    aceptaDatos: document.getElementById("aceptaDatos").checked,
    firma: dataURL
  };

  try {
    const response = await fetch(`${API_BASE}/registro`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(data)
    });

    if (response.ok) {
      alert("Registro guardado correctamente ✅");
      form.reset();
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    } else {
      const resData = await response.json();
      alert("Error: " + resData.error);
    }
  } catch (err) {
    alert("Error de conexión con el servidor.");
  }
});
</script>

</body>
</html>
