<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<link rel="icon" href="logo.png">
<title>Dashboard Visitantes</title>

<style>
body{
  font-family:Arial;
  margin:0;
  background:#002855;
  color:white;
  text-align:center;
}

/* 🔵 HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
}

/* 🔵 BOTÓN LOGOUT */
.logout{
  background:#ff4d4d;
  border:none;
  padding:10px 15px;
  border-radius:8px;
  color:white;
  font-weight:bold;
  cursor:pointer;
}

/* 🔵 CARDS */
.card{
  background:white;
  color:black;
  margin:20px auto;
  padding:20px;
  border-radius:12px;
  width:300px;
  box-shadow:0px 5px 15px rgba(0,0,0,0.2);
}

/* 🔵 BOTÓN EXCEL */
.excel{
  background:#28a745;
  color:white;
  border:none;
  padding:12px 20px;
  border-radius:8px;
  font-weight:bold;
  cursor:pointer;
}
</style>

</head>

<body>

<div class="header">
  <h2>📊 Dashboard Visitantes</h2>
  <button class="logout" onclick="logout()">Cerrar sesión</button>
</div>

<div class="card">
  <h3>Total Registros</h3>
  <h1 id="total">0</h1>
</div>

<div class="card">
  <button class="excel" onclick="descargarExcel()">📥 Descargar Excel</button>
</div>

<script>

const API = "https://slb-digital-forms.onrender.com";

// 🔒 PROTECCIÓN LOGIN
if(localStorage.getItem("auth") !== "ok"){
  window.location.href = "login.html";
}

// 🔹 CARGAR DATOS
fetch(`${API}/registros`)
.then(r => r.json())
.then(data => {
  document.getElementById("total").innerText = data.length;
})
.catch(err => {
  console.log("Error:", err);
});

// 🔹 LOGOUT
function logout(){
  localStorage.removeItem("auth");
  window.location.href = "index.html";
}

// 🔹 DESCARGAR EXCEL (BACKEND)
function descargarExcel(){
  window.open(`${API}/export_excel`, "_blank");
}

</script>

</body>
</html>
